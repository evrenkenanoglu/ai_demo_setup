events { worker_connections 1024; 
}

http {
    upstream backend_pool   { server backend:8000; 
    }
    upstream frontend_pool  { server us_frontend_dev:3500; 
    }

    server {
        listen 80;

        # ── NEW: WebSocket tunnel for Next.js HMR ──────────────
        location /_next/webpack-hmr {
            proxy_pass         http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        location /api/ {
            proxy_pass http://backend_pool/;
        }

        location / {
            proxy_pass         http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";   # ← also add this here
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
        }
    }
}